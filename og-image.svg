<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="-1" cy="-78" r="77" fill="#6d28d9" opacity="0.17"/>
    <circle cx="9" cy="586" r="85" fill="#6d28d9" opacity="0.18"/>
    <circle cx="788" cy="140" r="89" fill="#6d28d9" opacity="0.19"/>
    <circle cx="520" cy="472" r="84" fill="#6d28d9" opacity="0.14"/>
    <circle cx="381" cy="208" r="81" fill="#6d28d9" opacity="0.13"/>
    <circle cx="1053" cy="229" r="99" fill="#6d28d9" opacity="0.06"/>
    <rect x="814" y="165" width="43" height="70" rx="8" fill="#7c3aed" opacity="0.08" transform="rotate(31, 304, 364)"/>
    <rect x="-58" y="73" width="20" height="86" rx="8" fill="#7c3aed" opacity="0.12" transform="rotate(26, 384, 454)"/>
    <rect x="447" y="65" width="87" height="90" rx="8" fill="#7c3aed" opacity="0.09" transform="rotate(26, 336, 464)"/>
    <rect x="1281" y="367" width="20" height="90" rx="8" fill="#7c3aed" opacity="0.04" transform="rotate(28, 597, 381)"/>
    <rect x="-9" y="596" width="72" height="57" rx="8" fill="#7c3aed" opacity="0.14" transform="rotate(29, -41, 149)"/>
    <rect x="1110" y="303" width="52" height="21" rx="8" fill="#7c3aed" opacity="0.04" transform="rotate(14, 687, 165)"/>
    <rect x="142" y="29" width="37" height="45" rx="8" fill="#7c3aed" opacity="0.14" transform="rotate(22, 716, 279)"/>
    <rect x="770" y="314" width="75" height="94" rx="8" fill="#7c3aed" opacity="0.13" transform="rotate(30, 488, 602)"/>
    <polygon points="1292,-52 1341,46 1243,46" fill="#6d28d9" opacity="0.07"/>
    <polygon points="1067,12 1153,184 981,184" fill="#6d28d9" opacity="0.04"/>
    <polygon points="906,533 995,711 817,711" fill="#6d28d9" opacity="0.04"/>
    <polygon points="474,-159 566,25 382,25" fill="#6d28d9" opacity="0.08"/>

  <!-- Wave at bottom -->
  <path d="M0,562 C360,596 840,528 1200,562 L1200,630 L0,630Z" fill="#6d28d9" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    SEO 오토파일럿 가격
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 서버 웜업
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#f472b6" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#f472b6" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 SEO 오토파일럿 가격 — 서버 웜업
  </text>
</svg>